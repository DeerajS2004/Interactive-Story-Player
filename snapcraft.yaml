name: interactive-story-player
version: '1.0'
summary: Interactive Story Player Game
description: |
  An interactive story game built with Avalonia UI framework.
  Navigate through the enchanted forest and make choices that shape your adventure.

base: core20
confinement: strict
grade: stable

architectures:
  - build-on: amd64

parts:
  interactive-story-player:
    plugin: dump
    source: ./publish/linux
    stage-packages:
      - libgtk-3-0
      - libglib2.0-0
      - libgdk-pixbuf-2.0-0
      - libcairo-gobject2
      - libpango-1.0-0
      - libatk1.0-0
      - libcairo2
      - libgdk3.0-cil
      - libgtk3.0-cil

apps:
  interactive-story-player:
    command: InteractiveStoryPlayer
    desktop: usr/share/applications/interactive-story-player.desktop
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - audio-playback
      - home
